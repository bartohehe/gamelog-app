// ─── ATOMS ────────────────────────────────────────────────────────────────────
function Cover({ game, style={} }) {
  const colors = COVER_COLORS[game.cover] || ["#111","#555"];
  const letters = game.title.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return (
    <div style={{ width:"100%", height:"100%", background:`linear-gradient(150deg,${colors[0]} 0%,${colors[1]} 100%)`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", ...style }}>
      <div style={{ fontSize:22, fontWeight:800, color:"rgba(255,255,255,0.9)", letterSpacing:2, fontFamily:"monospace" }}>{letters}</div>
      <div style={{ fontSize:9, color:"rgba(255,255,255,0.4)", marginTop:3 }}>{game.year}</div>
    </div>
  );
}

function ScoreBadge({ score, t, size="md" }) {
  if (score==null) return <span style={{ color:t.textFaint, fontSize:11 }}>–</span>;
  const color = score>=80?"#22c55e":score>=60?"#f59e0b":"#ef4444";
  const s = { sm:{fontSize:11,padding:"2px 6px"}, md:{fontSize:13,padding:"3px 8px"}, lg:{fontSize:22,padding:"6px 14px",fontWeight:900} };
  return <span style={{ background:`${color}20`, color, border:`1px solid ${color}40`, borderRadius:6, fontWeight:700, fontFamily:"monospace", ...s[size] }}>{score}</span>;
}

function StatusBadge({ status, t, small }) {
  const meta = STATUS_META[status];
  const key = status.charAt(0).toUpperCase()+status.slice(1).replace(/_([a-z])/g,(_,c)=>c.toUpperCase());
  const color = t[`status${key}`] || t.accent;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:`${color}18`, color, border:`1px solid ${color}35`, borderRadius:20, fontWeight:600, fontSize:small?10:11, padding:small?"2px 7px":"3px 10px" }}>
      <span style={{ fontSize:small?8:9 }}>{meta.icon}</span>{meta.label}
    </span>
  );
}

function Sidebar({ screen, setScreen, t, theme, setTheme, layout }) {
  const [expanded, setExpanded] = useState(false);
  const W_collapsed = 60, W_expanded = 220;
  const width = expanded ? W_expanded : W_collapsed;

  return (
    <div
      onMouseEnter={() => setExpanded(true)}
      onMouseLeave={() => setExpanded(false)}
      style={{
        width, minWidth: width, flexShrink:0, transition:"width 0.22s cubic-bezier(.4,0,.2,1)",
        background: t.sidebarBg, borderRight:`1px solid ${t.border}`,
        display:"flex", flexDirection:"column", overflow:"hidden", position:"relative", zIndex:10,
      }}>

      {/* Logo */}
      <div style={{ padding:"22px 0", display:"flex", alignItems:"center", justifyContent:"center", borderBottom:`1px solid ${t.border}`, height:68, flexShrink:0, overflow:"hidden" }}>
        <div style={{ width:34, height:34, background:t.accent, borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, fontWeight:900, color:"#fff", fontFamily:t.fontHeading, boxShadow:`0 0 18px ${t.accentGlow}`, flexShrink:0 }}>G</div>
        <span style={{ fontFamily:t.fontHeading, fontWeight:700, fontSize:17, color:t.text, marginLeft:10, whiteSpace:"nowrap", opacity: expanded?1:0, transition:"opacity 0.15s", pointerEvents:"none" }}>Gamelogg</span>
      </div>

      {/* Nav */}
      <nav style={{ padding:"12px 0", flex:1 }}>
        {NAV_ITEMS.map(item => {
          const active = screen===item.id || (item.id==="library" && ["library","game_detail","add_game"].includes(screen));
          return (
            <button key={item.id} onClick={() => setScreen(item.id)} style={{
              width:"100%", display:"flex", alignItems:"center",
              padding: expanded?"10px 18px":"10px 0",
              justifyContent: expanded?"flex-start":"center",
              gap:12, border:"none", cursor:"pointer",
              background: active?`${t.accent}20`:"transparent",
              color: active?t.accentLight:t.textMuted,
              fontFamily:t.fontBody, fontSize:13.5, fontWeight:active?600:400,
              marginBottom:2, transition:"all 0.15s", borderLeft: active?`3px solid ${t.accent}`:"3px solid transparent",
            }}
            onMouseEnter={e=>{ if(!active){ e.currentTarget.style.background=`${t.accent}10`; e.currentTarget.style.color=t.text; }}}
            onMouseLeave={e=>{ if(!active){ e.currentTarget.style.background="transparent"; e.currentTarget.style.color=t.textMuted; }}}
            >
              {item.svg}
              <span style={{ whiteSpace:"nowrap", opacity:expanded?1:0, transition:"opacity 0.12s", maxWidth: expanded?200:0, overflow:"hidden" }}>{item.label}</span>
            </button>
          );
        })}

        {/* Status count pills — only when expanded */}
        {expanded && (
          <div style={{ marginTop:20, padding:"0 14px" }}>
            <div style={{ fontSize:10, fontWeight:600, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", marginBottom:8 }}>Statusy</div>
            {Object.entries(STATUS_META).map(([key, meta]) => {
              const cKey = key.charAt(0).toUpperCase()+key.slice(1).replace(/_([a-z])/g,(_,c)=>c.toUpperCase());
              const color = t[`status${cKey}`] || t.accent;
              const count = MOCK_GAMES.filter(g=>g.status===key).length;
              return (
                <div key={key} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"4px 6px", borderRadius:6, marginBottom:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                    <div style={{ width:6, height:6, borderRadius:"50%", background:color }}></div>
                    <span style={{ fontSize:12, color:t.textMuted }}>{meta.label}</span>
                  </div>
                  <span style={{ fontSize:11, color:t.textFaint, fontVariantNumeric:"tabular-nums" }}>{count}</span>
                </div>
              );
            })}
          </div>
        )}
      </nav>

      {/* Theme picker */}
      <div style={{ padding: expanded?"10px 14px":"10px 0", borderTop:`1px solid ${t.border}`, flexShrink:0 }}>
        {expanded ? (
          <>
            <div style={{ fontSize:10, fontWeight:600, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", marginBottom:7 }}>Motyw</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:4 }}>
              {THEME_LIST.map(([key, color, label]) => (
                <button key={key} onClick={()=>setTheme(key)} style={{
                  display:"flex", alignItems:"center", gap:5,
                  padding:"5px 7px", border:`1px solid ${theme===key?color:"transparent"}`,
                  borderRadius:7, cursor:"pointer",
                  background: theme===key?`${color}20`:t.bgElevated,
                  color: theme===key?color:t.textMuted,
                  fontSize:11, fontWeight:theme===key?600:400,
                  fontFamily:t.fontBody, transition:"all 0.15s", textAlign:"left",
                }}>
                  <span style={{ width:7, height:7, borderRadius:"50%", background:color, flexShrink:0, display:"inline-block" }}></span>
                  {label}
                </button>
              ))}
            </div>
          </>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
            {THEME_LIST.map(([key, color]) => (
              <button key={key} onClick={()=>setTheme(key)} style={{
                width:20, height:20, borderRadius:"50%", border:`2px solid ${theme===key?color:"transparent"}`,
                background:color, cursor:"pointer", padding:0, transition:"all 0.15s",
                outline: theme===key?`2px solid ${color}40`:"none", outlineOffset:1,
              }} />
            ))}
          </div>
        )}
      </div>

// ─── HERO CAROUSEL ────────────────────────────────────────────────────────────
const HERO_GAMES = [MOCK_GAMES[3], MOCK_GAMES[0], MOCK_GAMES[7], MOCK_GAMES[1], TRENDING[1]];

function HeroCarousel({ t, setSelectedGame, setScreen }) {
  const [idx, setIdx] = useState(0);
  const timerRef = useRef(null);

  const go = useCallback((n) => {
    setIdx((prev) => (prev + n + HERO_GAMES.length) % HERO_GAMES.length);
  }, []);

  useEffect(() => {
    timerRef.current = setInterval(() => go(1), 5000);
    return () => clearInterval(timerRef.current);
  }, [go]);

  const game = HERO_GAMES[idx];
  const colors = COVER_COLORS[game.cover] || ["#111","#333"];

  return (
    <div style={{ position:"relative", height:340, borderRadius:16, overflow:"hidden", flexShrink:0 }}>
      {/* Background */}
      <div style={{ position:"absolute", inset:0, background:`linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 60%, ${colors[0]} 100%)`, transition:"background 0.5s" }}>
        <div style={{ position:"absolute", inset:0, opacity:0.07, backgroundImage:"repeating-linear-gradient(45deg, rgba(255,255,255,0.5) 0, rgba(255,255,255,0.5) 1px, transparent 0, transparent 50%)", backgroundSize:"20px 20px" }} />
        <div style={{ position:"absolute", inset:0, background:`linear-gradient(to right, ${t.bg}f0 0%, ${t.bg}80 50%, transparent 100%)` }} />
      </div>

      {/* Cover mockup */}
      <div style={{ position:"absolute", right:40, top:"50%", transform:"translateY(-50%)", width:160, height:210, borderRadius:10, overflow:"hidden", boxShadow:"0 20px 60px rgba(0,0,0,0.7)", border:"2px solid rgba(255,255,255,0.1)" }}>
        <Cover game={game} />
      </div>

      {/* Content */}
      <div style={{ position:"absolute", left:40, top:"50%", transform:"translateY(-50%)", maxWidth:440 }}>
        <div style={{ fontSize:11, color:t.accentLight, fontWeight:700, letterSpacing:2, textTransform:"uppercase", marginBottom:10 }}>✦ Polecane</div>
        <h2 style={{ fontFamily:t.fontHeading, fontSize:36, fontWeight:800, color:"#fff", lineHeight:1.1, marginBottom:12, textShadow:"0 2px 20px rgba(0,0,0,0.5)" }}>{game.title}</h2>
        <div style={{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:12 }}>{game.developer} · {game.year} · {(game.genre||[]).join(", ")}</div>

        <div style={{ display:"flex", gap:10 }}>

            padding:"10px 22px", background:t.accent, border:"none", borderRadius:9, color:"#fff",
            fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:t.fontBody,
            boxShadow:`0 0 24px ${t.accentGlow}`
          }}>Zobacz szczegóły</button>
          <button style={{ padding:"10px 18px", background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)", borderRadius:9, color:"#fff", fontSize:13, cursor:"pointer", fontFamily:t.fontBody, backdropFilter:"blur(8px)" }}>+ Dodaj do backlogu</button>
        </div>
      </div>

      {/* Dots */}
      <div style={{ position:"absolute", bottom:18, left:40, display:"flex", gap:6 }}>

// ─── HORIZONTAL SCROLL ROW ────────────────────────────────────────────────────
function GameRow({ games, t, onGameClick, cardWidth=160, cardHeight=210 }) {
  return (
    <div style={{ display:"flex", gap:14, overflowX:"auto", paddingBottom:8, scrollbarWidth:"thin" }}>
      {games.map(game => (
        <div key={game.id} onClick={() => onGameClick(game)}
          style={{ width:cardWidth, flexShrink:0, background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:10, overflow:"hidden", cursor:"pointer", transition:"all 0.15s" }}
          onMouseEnter={e=>{ e.currentTarget.style.borderColor=t.borderHover; e.currentTarget.style.transform="translateY(-3px)"; e.currentTarget.style.boxShadow=`0 10px 30px ${t.accentGlow}`; }}
          onMouseLeave={e=>{ e.currentTarget.style.borderColor=t.border; e.currentTarget.style.transform=""; e.currentTarget.style.boxShadow=""; }}>
          <div style={{ height:cardHeight, position:"relative" }}>
            <Cover game={game} />

            <div style={{ fontSize:11, color:t.textFaint }}>{game.year}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

            <div style={{ fontSize:13, color:t.textMuted, marginTop:4 }}>{MOCK_GAMES.length} gier w kolekcji</div>
          </div>
          <div style={{ display:"flex", gap:10, alignItems:"center" }}>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{ background:t.bgCard, border:`1px solid ${t.border}`, color:t.textMuted, borderRadius:8, padding:"7px 12px", fontSize:12, cursor:"pointer", fontFamily:t.fontBody, outline:"none" }}>
              <option value="title">A-Z</option>
              <option value="score">Ocena</option>
              <option value="year">Rok</option>
            </select>
            <div style={{ display:"flex", background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:8, overflow:"hidden" }}>
              {[["grid","⊞"],["list","≡"]].map(([v,icon])=>(
                <button key={v} onClick={()=>setView(v)} style={{ padding:"7px 12px", border:"none", cursor:"pointer", background:view===v?t.accent:"transparent", color:view===v?"#fff":t.textMuted, fontSize:14, transition:"all 0.15s" }}>{icon}</button>
              ))}
            </div>
            <button onClick={openAdd} style={{ padding:"8px 16px", background:t.accent, color:"#fff", border:"none", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:600, fontFamily:t.fontBody, boxShadow:`0 0 20px ${t.accentGlow}` }}>+ Dodaj grę</button>
          </div>
        </div>

        <div style={{ display:"flex", gap:6, marginBottom:24, flexWrap:"wrap" }}>
          {[["all","Wszystkie"], ...Object.entries(STATUS_META).map(([k,v])=>[k,v.label])].map(([key,label])=>{
            const active = filterStatus===key;
            const cKey = key==="all"?"":key.charAt(0).toUpperCase()+key.slice(1).replace(/_([a-z])/g,(_,c)=>c.toUpperCase());
            const color = key==="all"?t.accent:(t[`status${cKey}`]||t.accent);
            return (
              <button key={key} onClick={()=>setFilterStatus(key)} style={{ padding:"5px 14px", borderRadius:20, border:`1px solid ${active?color:t.border}`, background:active?`${color}20`:"transparent", color:active?color:t.textMuted, fontSize:12, fontWeight:active?600:400, cursor:"pointer", fontFamily:t.fontBody, transition:"all 0.15s" }}>
                {label}{key!=="all"&&<span style={{ opacity:0.7 }}> ({MOCK_GAMES.filter(g=>g.status===key).length})</span>}
              </button>
            );
          })}
        </div>

        {view==="grid" && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(155px, 1fr))", gap:14 }}>
            {filtered.map(game => (
              <div key={game.id} onClick={()=>{ setSelectedGame(game); setScreen("game_detail"); }}
                style={{ background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:10, overflow:"hidden", cursor:"pointer", transition:"all 0.15s" }}
                onMouseEnter={e=>{ e.currentTarget.style.borderColor=t.borderHover; e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow=`0 8px 24px ${t.accentGlow}`; }}
                onMouseLeave={e=>{ e.currentTarget.style.borderColor=t.border; e.currentTarget.style.transform=""; e.currentTarget.style.boxShadow=""; }}>
                <div style={{ height:215, position:"relative" }}>
                  <Cover game={game} />
                  <div style={{ position:"absolute", top:7, right:7 }}><StatusBadge status={game.status} t={t} small /></div>
                  {game.score!=null && <div style={{ position:"absolute", bottom:7, left:7 }}><ScoreBadge score={game.score} t={t} size="sm" /></div>}
                </div>
                <div style={{ padding:"9px 11px" }}>
                  <div style={{ fontWeight:600, fontSize:12.5, color:t.text, lineHeight:1.3, marginBottom:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{game.title}</div>
                  <div style={{ fontSize:11, color:t.textFaint }}>{game.year}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {view==="list" && (
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {filtered.map(game => (
              <div key={game.id} onClick={()=>{ setSelectedGame(game); setScreen("game_detail"); }}
                style={{ background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:10, padding:"12px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:14, transition:"all 0.15s" }}
                onMouseEnter={e=>{ e.currentTarget.style.borderColor=t.borderHover; e.currentTarget.style.background=t.bgHover; }}
                onMouseLeave={e=>{ e.currentTarget.style.borderColor=t.border; e.currentTarget.style.background=t.bgCard; }}>
                <div style={{ width:40, height:54, borderRadius:5, overflow:"hidden", flexShrink:0 }}><Cover game={game} /></div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:600, color:t.text, fontSize:14 }}>{game.title}</div>
                  <div style={{ fontSize:12, color:t.textMuted }}>{game.developer} · {game.genre.join(", ")}</div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
                  <StatusBadge status={game.status} t={t} small />
                  {game.hours>0 && <span style={{ fontSize:12, color:t.textFaint }}>{game.hours}h</span>}
                  <ScoreBadge score={game.score} t={t} size="sm" />
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

          <div style={{ flex:1, paddingTop:24 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}><StatusBadge status={game.status} t={t} /><span style={{ fontSize:12, color:t.textFaint }}>{game.year}</span></div>

            <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
              {game.tags.map(tag=><span key={tag} style={{ fontSize:11, background:t.tagBg, color:t.tagText, border:`1px solid ${t.tagText}30`, borderRadius:20, padding:"2px 10px" }}>{tag}</span>)}

        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, margin:"28px 0" }}>

              <div style={{ fontSize:11, color:t.textMuted, marginTop:3 }}>{s.label}</div>

          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>

            <button onClick={()=>setEditing(!editing)} style={{ fontSize:12, color:editing?t.accentSecondary:t.accent, background:"none", border:"none", cursor:"pointer", fontFamily:t.fontBody }}>{editing?"Zapisz":"Edytuj"}</button>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:editing?16:0 }}>

              <div style={{ fontSize:11, color:scoreColor, marginTop:2, fontWeight:600 }}>{score>=90?"Arcydzieło":score>=80?"Świetna":score>=70?"Dobra":score>=60?"Przeciętna":score>0?"Słaba":"Brak oceny"}</div>
            </div>
          </div>
          {editing && <div style={{ marginBottom:20 }}>
            <input type="range" min="0" max="100" value={score} onChange={e=>setScore(Number(e.target.value))} style={{ width:"100%", accentColor:t.accent, cursor:"pointer" }} />
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:t.textFaint, marginTop:2 }}><span>0</span><span>50</span><span>100</span></div>

          }
        </div>
      </div>
    </div>
  );
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
const SEARCH_RESULTS = [
  { id:101, title:"The Witcher 3: Wild Hunt", year:2015, genre:["Action RPG"], developer:"CD Projekt RED", cover:"elden" },
  { id:102, title:"Red Dead Redemption 2", year:2018, genre:["Action Adventure"], developer:"Rockstar Games", cover:"cyber" },
  { id:103, title:"Dark Souls III", year:2016, genre:["Action RPG"], developer:"FromSoftware", cover:"hades" },
  { id:104, title:"Metal Gear Solid V", year:2015, genre:["Action","Stealth"], developer:"Konami", cover:"alan" },
  { id:105, title:"Sekiro: Shadows Die Twice", year:2019, genre:["Action RPG"], developer:"FromSoftware", cover:"dead" },
];

function Search({ t }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);

  const handleSearch = (q) => {
    setQuery(q);
    if(q.length>1) {
      setSearching(true);
      setTimeout(()=>{
        setResults(SEARCH_RESULTS.filter(g=>g.title.toLowerCase().includes(q.toLowerCase())).concat(q.length>0?SEARCH_RESULTS.slice(0,3):[]).filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i));
        setSearching(false);
      },300);
    } else setResults([]);
  };

  return (
    <div style={{ flex:1, overflow:"auto", padding:"32px 36px" }}>
      <div style={{ maxWidth:720 }}>
        <h1 style={{ fontFamily:t.fontHeading, fontSize:26, fontWeight:700, color:t.text, marginBottom:24 }}>Wyszukaj gry</h1>
        <div style={{ position:"relative", marginBottom:32 }}>
          <svg style={{ position:"absolute", left:16, top:"50%", transform:"translateY(-50%)" }} width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={t.textFaint} strokeWidth="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
          <input value={query} onChange={e=>handleSearch(e.target.value)} placeholder="Szukaj gier..." autoFocus style={{ width:"100%", background:t.bgCard, border:`1px solid ${t.inputBorder}`, borderRadius:12, padding:"14px 14px 14px 44px", color:t.text, fontSize:16, fontFamily:t.fontBody, outline:"none" }} />
          {searching && <div style={{ position:"absolute", right:16, top:"50%", transform:"translateY(-50%)", fontSize:12, color:t.textFaint }}>szukam...</div>}
        </div>
        {query.length===0 && (
          <div>
            <div style={{ fontSize:11, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", marginBottom:12 }}>Popularne</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {["Elden Ring","Baldur's Gate 3","Cyberpunk 2077","Hades II","Hollow Knight"].map(s=>(
                <button key={s} onClick={()=>handleSearch(s)} style={{ padding:"7px 14px", background:t.tagBg, border:`1px solid ${t.border}`, borderRadius:20, color:t.tagText, fontSize:12, cursor:"pointer", fontFamily:t.fontBody }}>{s}</button>
              ))}
            </div>
          </div>
        )}
        {results.length>0 && (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            <div style={{ fontSize:11, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", marginBottom:4 }}>Wyniki ({results.length})</div>
            {results.map(game=>{
              const inLib = MOCK_GAMES.some(g=>g.title===game.title);
              return (
                <div key={game.id} style={{ background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:10, padding:"12px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:14, transition:"all 0.15s" }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=t.borderHover}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=t.border}>
                  <div style={{ width:44, height:58, borderRadius:6, overflow:"hidden", flexShrink:0 }}><Cover game={game} /></div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, color:t.text, fontSize:14 }}>{game.title}</div>
                    <div style={{ fontSize:12, color:t.textMuted }}>{game.developer} · {game.year} · {game.genre.join(", ")}</div>
                  </div>
                  {inLib
                    ? <span style={{ fontSize:11, color:t.statusCompleted, border:`1px solid ${t.statusCompleted}30`, background:`${t.statusCompleted}15`, borderRadius:20, padding:"3px 10px" }}>W bibliotece</span>
                    : <button style={{ padding:"6px 14px", background:t.accent, border:"none", borderRadius:8, color:"#fff", fontSize:12, cursor:"pointer", fontFamily:t.fontBody, fontWeight:600 }}>+ Dodaj</button>
                  }
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PROFILE ──────────────────────────────────────────────────────────────────
function Profile({ t }) {
  const completed=MOCK_GAMES.filter(g=>g.status==="completed");
  const scored=MOCK_GAMES.filter(g=>g.score);
  const avgScore=Math.round(scored.reduce((a,b)=>a+b.score,0)/scored.length);
  const totalHours=MOCK_GAMES.reduce((a,b)=>a+b.hours,0);
  const genreCount={};
  MOCK_GAMES.forEach(g=>g.genre.forEach(gen=>{ genreCount[gen]=(genreCount[gen]||0)+1; }));
  const topGenres=Object.entries(genreCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxGenre=topGenres[0]?.[1]||1;

  return (
    <div style={{ flex:1, overflow:"auto", padding:"32px 36px" }}>
      <div style={{ maxWidth:800 }}>
        <div style={{ display:"flex", alignItems:"center", gap:24, marginBottom:36, background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:16, padding:28 }}>
          <div style={{ width:80, height:80, borderRadius:"50%", background:t.accentGlow, border:`3px solid ${t.accent}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28, color:t.accent, fontWeight:700, fontFamily:t.fontHeading, flexShrink:0 }}>MK</div>
          <div style={{ flex:1 }}>
            <h1 style={{ fontFamily:t.fontHeading, fontSize:24, fontWeight:700, color:t.text }}>Michał Kowalski</h1>
            <div style={{ fontSize:13, color:t.textMuted, marginTop:2 }}>@michalkowalski · Gracz od 2008 roku</div>
            <div style={{ display:"flex", gap:16, marginTop:12 }}>
              {[["Obserwuje","12"],["Obserwujący","34"]].map(([l,v])=>(
                <div key={l} style={{ fontSize:12, color:t.textMuted }}><span style={{ fontWeight:700, color:t.text }}>{v}</span> {l}</div>
              ))}
            </div>
          </div>
          <button style={{ padding:"8px 18px", background:"none", border:`1px solid ${t.border}`, borderRadius:8, color:t.textMuted, cursor:"pointer", fontSize:12, fontFamily:t.fontBody }}>Edytuj profil</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:36 }}>
          {[{label:"Ukończonych",value:completed.length},{label:"Łącznie godzin",value:`${totalHours}h`},{label:"Średnia ocena",value:avgScore},{label:"Najwyższa",value:Math.max(...scored.map(g=>g.score))}].map(s=>(
            <div key={s.label} style={{ background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:12, padding:"18px 20px", textAlign:"center" }}>
              <div style={{ fontSize:30, fontWeight:800, color:t.text, fontFamily:t.fontHeading }}>{s.value}</div>
              <div style={{ fontSize:11, color:t.textMuted, marginTop:4 }}>{s.label}</div>
            </div>
          ))}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
          <div style={{ background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:14, padding:24 }}>
            <h3 style={{ fontFamily:t.fontHeading, fontSize:16, fontWeight:600, color:t.text, marginBottom:20 }}>Ulubione gatunki</h3>
            {topGenres.map(([genre,count])=>(
              <div key={genre} style={{ marginBottom:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                  <span style={{ fontSize:13, color:t.text }}>{genre}</span>
                  <span style={{ fontSize:12, color:t.textMuted }}>{count}</span>
                </div>
                <div style={{ height:5, background:t.bgElevated, borderRadius:3, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${(count/maxGenre)*100}%`, background:t.scoreGradient, borderRadius:3 }} />
                </div>
              </div>
            ))}
          </div>
          <div style={{ background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:14, padding:24 }}>
            <h3 style={{ fontFamily:t.fontHeading, fontSize:16, fontWeight:600, color:t.text, marginBottom:16 }}>Top ocenione</h3>
            {scored.sort((a,b)=>b.score-a.score).slice(0,5).map((game,i)=>(
              <div key={game.id} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>

                </div>
                <div style={{ padding:"9px 11px" }}>
                  <div style={{ fontWeight:600, fontSize:12.5, color:t.text, lineHeight:1.3, marginBottom:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.title}</div>
                  <div style={{ fontSize:10.5, color:t.textFaint, display:"flex", justifyContent:"space-between" }}>
                    <span>{m.year}</span>
                    {progress!=null && progress<100 ? <span style={{ color:statusMeta.color }}>{m.watched}/{m.episodes}</span> : <span>{statusMeta.label}</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  { query:"oppenheimer", type:"film", when:"wczoraj" },
  { query:"sci-fi 2024", type:"film", when:"wczoraj" },
  { query:"mappa", type:"anime", when:"3 dni temu" },

const MEDIA_GENRE_QUICK = [
  { label:"Sci-Fi",        icon:"✦", color:"#06b6d4" },
  { label:"Drama",         icon:"◆", color:"#a855f7" },
  { label:"Horror",        icon:"☾", color:"#ef4444" },
  { label:"Komedia",       icon:"☺", color:"#f59e0b" },
  { label:"Fantasy",       icon:"❉", color:"#22c55e" },
  { label:"Animacja",      icon:"✿", color:"#e879f9" },
  { label:"Dokument",      icon:"▣", color:"#64748b" },
  { label:"Thriller",      icon:"▲", color:"#dc2626" },
];

function MediaSearch({ t }) {
  const [query, setQuery] = useState("");
  const [debounced, setDebounced] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [yearFilter, setYearFilter] = useState("all"); // all | 2024+ | 2020-2023 | older
  const [sortBy, setSortBy] = useState("relevance"); // relevance | year | rating | popularity
  const [searching, setSearching] = useState(false);
  const inputRef = useRef(null);

  // Debounce
  useEffect(() => {
    if (query.length === 0) { setDebounced(""); setSearching(false); return; }
    setSearching(true);
    const t = setTimeout(() => { setDebounced(query); setSearching(false); }, 250);
    return () => clearTimeout(t);
  }, [query]);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const inLibTitles = new Set(MEDIA_ITEMS.map(m => m.title));

  const yearMatches = (y) => {
    if (yearFilter === "all") return true;
    if (yearFilter === "new") return y >= 2024;
    if (yearFilter === "recent") return y >= 2020 && y <= 2023;
    if (yearFilter === "older") return y < 2020;
    return true;
  };

  const baseFilter = (m) =>
    (typeFilter === "all" || m.type === typeFilter) &&
    yearMatches(m.year) &&
    (debounced.length === 0 || (
      m.title.toLowerCase().includes(debounced.toLowerCase()) ||
      m.creator.toLowerCase().includes(debounced.toLowerCase()) ||
      m.genre.some(g => g.toLowerCase().includes(debounced.toLowerCase()))
    ));

  const sorted = MEDIA_SEARCH_DB.filter(baseFilter).sort((a,b) => {
    if (sortBy === "year") return b.year - a.year;
    if (sortBy === "rating") return b.criticScore - a.criticScore;
    if (sortBy === "popularity") return b.popularity - a.popularity;
    // relevance: title startsWith > popularity
    if (debounced) {
      const qa = a.title.toLowerCase().startsWith(debounced.toLowerCase()) ? 1 : 0;
      const qb = b.title.toLowerCase().startsWith(debounced.toLowerCase()) ? 1 : 0;
      if (qa !== qb) return qb - qa;
    }
    return b.popularity - a.popularity;
  });

  const grouped = {
    film: sorted.filter(m => m.type === "film"),
    serial: sorted.filter(m => m.type === "serial"),
    anime: sorted.filter(m => m.type === "anime"),
  };

  const totalCount = sorted.length;
  const isEmpty = debounced.length > 0 && totalCount === 0;
  const showResults = debounced.length > 0;

  // ── Empty state (no query) ──
  const EmptyState = () => (
    <div>
      {/* Recent */}
      <div style={{ marginBottom:32 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
          <div style={{ fontSize:11, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", fontWeight:600 }}>Ostatnio wyszukiwane</div>
          <button style={{ fontSize:11, color:t.textFaint, background:"none", border:"none", cursor:"pointer", fontFamily:t.fontBody }}>Wyczyść</button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          {RECENT_MEDIA_SEARCHES.map((r,i) => {
            const meta = MEDIA_TYPE_META[r.type];
            return (
              <button key={i} onClick={()=>setQuery(r.query)} style={{
                display:"flex", alignItems:"center", gap:12, padding:"10px 14px",
                background:"transparent", border:`1px solid transparent`, borderRadius:10,
                cursor:"pointer", textAlign:"left", fontFamily:t.fontBody, color:t.text,
                transition:"all 0.12s",
              }}
              onMouseEnter={e=>{ e.currentTarget.style.background=t.bgCard; e.currentTarget.style.borderColor=t.border; }}
              onMouseLeave={e=>{ e.currentTarget.style.background="transparent"; e.currentTarget.style.borderColor="transparent"; }}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke={t.textFaint} strokeWidth="1.5"><circle cx="7" cy="7" r="5.5"/><path d="M7 4v3l2 1.5"/></svg>
                <span style={{ flex:1, fontSize:13, color:t.text }}>{r.query}</span>
                <span style={{ fontSize:10, padding:"2px 8px", borderRadius:14, background:`${meta.color}18`, color:meta.color, border:`1px solid ${meta.color}30`, fontWeight:600 }}>{meta.icon} {meta.label}</span>
                <span style={{ fontSize:11, color:t.textFaint, minWidth:70, textAlign:"right" }}>{r.when}</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Trending */}
      <div style={{ marginBottom:32 }}>
        <div style={{ fontSize:11, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", fontWeight:600, marginBottom:12 }}>Popularne teraz</div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {TRENDING_MEDIA_SEARCHES.map(s => (
            <button key={s} onClick={()=>setQuery(s)} style={{
              padding:"7px 14px", background:t.tagBg, border:`1px solid ${t.border}`,
              borderRadius:20, color:t.tagText, fontSize:12, cursor:"pointer", fontFamily:t.fontBody,
              transition:"all 0.12s",
            }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=t.tagText; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor=t.border; }}>
              <span style={{ marginRight:5, fontSize:10 }}>↗</span>{s}
            </button>
          ))}
        </div>
      </div>

      {/* Browse by genre */}
      <div>
        <div style={{ fontSize:11, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", fontWeight:600, marginBottom:12 }}>Przeglądaj po gatunkach</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))", gap:10 }}>
          {MEDIA_GENRE_QUICK.map(g => (
            <button key={g.label} onClick={()=>setQuery(g.label)} style={{
              display:"flex", alignItems:"center", gap:10, padding:"14px 16px",
              background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:12,
              cursor:"pointer", fontFamily:t.fontBody, color:t.text, textAlign:"left",
              transition:"all 0.15s",
            }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=g.color; e.currentTarget.style.background=t.bgHover; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor=t.border; e.currentTarget.style.background=t.bgCard; }}>
              <div style={{ width:32, height:32, borderRadius:8, background:`${g.color}20`, border:`1px solid ${g.color}40`, display:"flex", alignItems:"center", justifyContent:"center", color:g.color, fontSize:16, flexShrink:0 }}>{g.icon}</div>
              <span style={{ fontSize:13, fontWeight:500 }}>{g.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  // ── Result card row ──
  const ResultRow = ({ m }) => {
    const meta = MEDIA_TYPE_META[m.type];
    const inLib = inLibTitles.has(m.title);
    const scoreColor = m.criticScore >= 90 ? "#22c55e" : m.criticScore >= 75 ? "#f59e0b" : "#ef4444";
    return (
      <div style={{
        display:"flex", alignItems:"center", gap:14,
        padding:"12px 14px", background:t.bgCard, border:`1px solid ${t.border}`,
        borderRadius:10, cursor:"pointer", transition:"all 0.12s",
      }}
      onMouseEnter={e=>{ e.currentTarget.style.borderColor=meta.color+"60"; e.currentTarget.style.background=t.bgHover; }}
      onMouseLeave={e=>{ e.currentTarget.style.borderColor=t.border; e.currentTarget.style.background=t.bgCard; }}>
        <div style={{ width:46, height:62, borderRadius:6, overflow:"hidden", flexShrink:0 }}><Cover game={m} /></div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
            <span style={{ fontWeight:600, color:t.text, fontSize:14, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.title}</span>
            <span style={{ fontSize:10, padding:"1px 7px", borderRadius:12, background:`${meta.color}20`, color:meta.color, fontWeight:600, letterSpacing:0.5, textTransform:"uppercase", border:`1px solid ${meta.color}35`, flexShrink:0 }}>{meta.icon} {meta.label}</span>
          </div>
          <div style={{ fontSize:11.5, color:t.textMuted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
            {m.creator} · {m.year} · {m.runtime} · {m.genre.join(", ")}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0, minWidth:48 }}>
          <span style={{ fontSize:13, fontWeight:800, color:scoreColor, fontFamily:t.fontHeading, fontVariantNumeric:"tabular-nums" }}>{m.criticScore}</span>
          <span style={{ fontSize:10, color:t.textFaint }}>/100</span>
        </div>
        {inLib
          ? <span style={{ fontSize:11, color:"#22c55e", border:`1px solid #22c55e30`, background:`#22c55e15`, borderRadius:20, padding:"3px 10px", flexShrink:0, fontWeight:600 }}>✓ W bibliotece</span>
          : <button style={{ padding:"6px 14px", background:meta.color, border:"none", borderRadius:8, color:"#fff", fontSize:12, cursor:"pointer", fontFamily:t.fontBody, fontWeight:600, flexShrink:0 }}>+ Dodaj</button>
        }
      </div>
    );
  };

  // Highlight matched substring
  const highlight = (text) => {
    if (!debounced) return text;
    const idx = text.toLowerCase().indexOf(debounced.toLowerCase());
    if (idx < 0) return text;
    return <>{text.slice(0,idx)}<mark style={{ background:`${t.accent}40`, color:t.text, padding:0 }}>{text.slice(idx, idx+debounced.length)}</mark>{text.slice(idx+debounced.length)}</>;
  };

  return (
    <div style={{ flex:1, overflow:"auto", padding:"32px 36px" }}>
      <div style={{ maxWidth:860 }}>
        <div style={{ marginBottom:24 }}>
          <h1 style={{ fontFamily:t.fontHeading, fontSize:26, fontWeight:700, color:t.text }}>Wyszukaj media</h1>
          <p style={{ fontSize:13, color:t.textMuted, marginTop:4 }}>Filmy, seriale, anime — przeszukaj bazę i dodaj do swojej kolekcji</p>
        </div>

        {/* Search input */}
        <div style={{ position:"relative", marginBottom:18 }}>
          <svg style={{ position:"absolute", left:18, top:"50%", transform:"translateY(-50%)" }} width="18" height="18" viewBox="0 0 18 18" fill="none" stroke={t.textFaint} strokeWidth="1.6"><circle cx="7.5" cy="7.5" r="5.5"/><line x1="12" y1="12" x2="16" y2="16"/></svg>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)}
            placeholder="Tytuł, reżyser, studio, gatunek..."
            style={{ width:"100%", background:t.bgCard, border:`1px solid ${t.inputBorder}`, borderRadius:12, padding:"15px 50px 15px 48px", color:t.text, fontSize:16, fontFamily:t.fontBody, outline:"none" }} />
          {query && (
            <button onClick={()=>{ setQuery(""); inputRef.current?.focus(); }} style={{
              position:"absolute", right:14, top:"50%", transform:"translateY(-50%)",
              width:24, height:24, borderRadius:"50%", border:"none",
              background:t.bgElevated, color:t.textMuted, cursor:"pointer",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:14,
            }}>×</button>
          )}
          {searching && (
            <div style={{ position:"absolute", right:48, top:"50%", transform:"translateY(-50%)", fontSize:11, color:t.textFaint, letterSpacing:1, textTransform:"uppercase" }}>szukam…</div>
          )}
        </div>

        {/* Filters bar */}
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:8, alignItems:"center" }}>
          {/* Type segmented */}
          <div style={{ display:"flex", gap:4, padding:3, background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:9 }}>
            {[["all","Wszystko",null], ["film","Filmy",MEDIA_TYPE_META.film.color], ["serial","Seriale",MEDIA_TYPE_META.serial.color], ["anime","Anime",MEDIA_TYPE_META.anime.color]].map(([k,label,c])=>{
              const active = typeFilter===k;
              const color = c || t.accent;
              return (
                <button key={k} onClick={()=>setTypeFilter(k)} style={{
                  padding:"6px 12px", borderRadius:6, border:"none", cursor:"pointer",
                  background: active?(c?`${color}25`:t.accent):"transparent",
                  color: active?(c||"#fff"):t.textMuted,
                  fontSize:12, fontWeight:active?600:500, fontFamily:t.fontBody,
                  transition:"all 0.12s",
                }}>{label}</button>
              );
            })}
          </div>

          {/* Year filter */}
          <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)} style={{
            background:t.bgCard, border:`1px solid ${t.border}`, color:t.textMuted,
            borderRadius:8, padding:"7px 12px", fontSize:12, cursor:"pointer",
            fontFamily:t.fontBody, outline:"none",
          }}>
            <option value="all">Wszystkie lata</option>
            <option value="new">2024+</option>
            <option value="recent">2020–2023</option>
            <option value="older">Starsze</option>
          </select>

          {/* Sort */}
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{
            background:t.bgCard, border:`1px solid ${t.border}`, color:t.textMuted,
            borderRadius:8, padding:"7px 12px", fontSize:12, cursor:"pointer",
            fontFamily:t.fontBody, outline:"none",
          }}>
            <option value="relevance">Trafność</option>
            <option value="rating">Najlepiej oceniane</option>
            <option value="popularity">Najpopularniejsze</option>
            <option value="year">Najnowsze</option>
          </select>

          {/* Reset */}
          {(typeFilter!=="all" || yearFilter!=="all" || sortBy!=="relevance") && (
            <button onClick={()=>{ setTypeFilter("all"); setYearFilter("all"); setSortBy("relevance"); }} style={{
              background:"none", border:"none", color:t.accent, cursor:"pointer",
              fontSize:12, fontFamily:t.fontBody, padding:"7px 4px",
            }}>Resetuj filtry</button>
          )}
        </div>

        {/* Result count */}
        {showResults && !isEmpty && (
          <div style={{ fontSize:11.5, color:t.textFaint, marginBottom:14, marginTop:8 }}>
            Znaleziono <span style={{ color:t.text, fontWeight:600 }}>{totalCount}</span> {totalCount===1?"tytuł":totalCount<5?"tytuły":"tytułów"} dla „{debounced}"
          </div>
        )}

        {/* Body */}
        {!showResults && <EmptyState />}

        {showResults && isEmpty && (
          <div style={{ textAlign:"center", padding:"60px 20px", background:t.bgCard, border:`1px dashed ${t.border}`, borderRadius:14 }}>
            <div style={{ fontSize:36, color:t.textFaint, marginBottom:14 }}>⌕</div>
            <div style={{ fontSize:15, fontWeight:600, color:t.text, marginBottom:6 }}>Brak wyników dla „{debounced}"</div>
            <div style={{ fontSize:12.5, color:t.textMuted, marginBottom:18 }}>Spróbuj innego tytułu, gatunku lub zmień filtry.</div>
            <button style={{ padding:"8px 18px", background:t.accent, color:"#fff", border:"none", borderRadius:8, cursor:"pointer", fontSize:12.5, fontFamily:t.fontBody, fontWeight:600 }}>+ Dodaj „{debounced}" ręcznie</button>
          </div>
        )}

        {showResults && !isEmpty && (
          <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
            {(typeFilter === "all"
              ? ["film","serial","anime"]
              : [typeFilter]
            ).map(type => {
              const items = grouped[type];
              if (!items || items.length === 0) return null;
              const meta = MEDIA_TYPE_META[type];
              return (
                <div key={type}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                    <div style={{ width:22, height:22, borderRadius:6, background:`${meta.color}20`, border:`1px solid ${meta.color}40`, color:meta.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11 }}>{meta.icon}</div>

                          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:2, flexShrink:0, minWidth:60 }}>
                            <div style={{ display:"flex", alignItems:"baseline", gap:3 }}>
                              <span style={{ fontSize:15, fontWeight:800, color: m.criticScore>=90?"#22c55e":m.criticScore>=75?"#f59e0b":"#ef4444", fontFamily:t.fontHeading, fontVariantNumeric:"tabular-nums" }}>{m.criticScore}</span>
                              <span style={{ fontSize:9.5, color:t.textFaint }}>/100</span>
                            </div>
                            <div style={{ fontSize:9.5, color:t.textFaint, display:"flex", alignItems:"center", gap:3 }}>
                              <span style={{ color:meta.color }}>↗</span>{m.popularity}
                            </div>
                          </div>
                          {inLibTitles.has(m.title)
                            ? <span style={{ fontSize:11, color:"#22c55e", border:`1px solid #22c55e30`, background:`#22c55e15`, borderRadius:20, padding:"3px 10px", flexShrink:0, fontWeight:600, whiteSpace:"nowrap" }}>✓ W bibliotece</span>
                            : <button style={{ padding:"7px 14px", background:meta.color, border:"none", borderRadius:8, color:"#fff", fontSize:12, cursor:"pointer", fontFamily:t.fontBody, fontWeight:600, flexShrink:0, whiteSpace:"nowrap" }}>+ Dodaj</button>
                          }
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [theme, setTheme] = useState("crimson");
  const [layout, setLayout] = useState("B");
  const [showTweaks, setShowTweaks] = useState(false);

  const t = THEMES[theme] || THEMES.neon;

  const [screen, setScreen] = useState("discover");
  const [selectedGame, setSelectedGame] = useState(null);
  const [editGame, setEditGame] = useState(null);

  const openAdd = () => { setEditGame(null); setScreen("add_game"); };

  // Tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  return (
    <div style={{ width:"100vw", height:"100vh", background:t.bg, display:"flex", fontFamily:t.fontBody }}>
      <Sidebar screen={screen} setScreen={setScreen} t={t} theme={theme} setTheme={setTheme} layout={layout} />
      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
        {screen==="discover" && layout==="A" && <DiscoverA t={t} setScreen={setScreen} setSelectedGame={setSelectedGame} />}
        {screen==="discover" && layout==="B" && <DiscoverB t={t} setScreen={setScreen} setSelectedGame={setSelectedGame} />}
        {screen==="library" && <Library t={t} setScreen={setScreen} setSelectedGame={setSelectedGame} openAdd={openAdd} />}
        {screen==="game_detail" && selectedGame && <GameDetail game={selectedGame} t={t} setScreen={setScreen} />}
        {screen==="add_game" && <AddGame t={t} setScreen={setScreen} editGame={editGame} />}
        {screen==="search" && <Search t={t} />}
        {screen==="profile" && <Profile t={t} />}
        {screen==="multiplayer" && <Multiplayer t={t} />}
        {screen==="media" && <Media t={t} setScreen={setScreen} />}
        {screen==="media_search" && <MediaSearch t={t} />}
      </div>

      {/* Inline Tweaks panel */}
      {showTweaks && (
        <div style={{
          position:"fixed", right:16, bottom:16, zIndex:9999,
          width:260, background:"rgba(20,18,30,0.95)", backdropFilter:"blur(20px)",
          border:`1px solid ${t.border}`, borderRadius:14,
          boxShadow:"0 12px 40px rgba(0,0,0,0.5)", padding:0, overflow:"hidden",
          fontFamily:t.fontBody,
        }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 16px", borderBottom:`1px solid ${t.border}` }}>
            <span style={{ fontSize:12, fontWeight:700, color:t.text, letterSpacing:0.5 }}>Tweaks</span>
            <button onClick={()=>{ setShowTweaks(false); window.parent.postMessage({type:"__edit_mode_dismissed"},"*"); }} style={{ background:"none", border:"none", color:t.textMuted, cursor:"pointer", fontSize:16, padding:"0 2px" }}>×</button>
          </div>
          <div style={{ padding:"16px" }}>
            <div style={{ fontSize:10, fontWeight:600, color:t.textFaint, letterSpacing:1.5, textTransform:"uppercase", marginBottom:10 }}>Układ strony Odkryj</div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {[["A","A – Karuzela + wiersze"],["B","B – Full-bleed + 2 kolumny"]].map(([v,label])=>(
                <button key={v} onClick={()=>setLayout(v)} style={{
                  padding:"9px 14px", borderRadius:8, border:`1px solid ${layout===v?t.accent:t.border}`,
                  background: layout===v?`${t.accent}20`:"transparent",
                  color: layout===v?t.accentLight:t.textMuted,
                  fontSize:12.5, fontWeight:layout===v?600:400,
                  fontFamily:t.fontBody, cursor:"pointer", textAlign:"left",
                  transition:"all 0.15s",
                }}>{label}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
