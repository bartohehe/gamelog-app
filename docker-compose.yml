services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8081
    container_name: gamelog-frontend
    ports:
      - "8080:80"
    networks:
      - gamelog-network
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: gamelog-backend
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=gamelog-db;Database=GameLog;Username=postgres;Password=StrongPassword123!
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=local-docker-secret-key-minimum-32-characters!!
      - ExternalApis__Igdb__ClientId=${IGDB_CLIENT_ID:-}
      - ExternalApis__Igdb__ClientSecret=${IGDB_CLIENT_SECRET:-}
      - Riot__ApiKey=${RIOT_API_KEY:-}
      - Steam__ApiKey=${STEAM_API_KEY:-}
      - FeatureFlags__AuthEnabled=${AUTH_ENABLED:-true}
      - FeatureFlags__MultiplayerEnabled=${MULTIPLAYER_ENABLED:-true}
      - FeatureFlags__SocialFeaturesEnabled=${SOCIAL_FEATURES_ENABLED:-false}
      - FeatureFlags__ReviewsEnabled=${REVIEWS_ENABLED:-true}
      - FeatureFlags__BacklogEnabled=${BACKLOG_ENABLED:-true}
      - FeatureFlags__StatisticsEnabled=${STATISTICS_ENABLED:-false}
    networks:
      - gamelog-network
    depends_on:
      - gamelog-db
      - redis

  gamelog-db:
    image: postgres:16-alpine
    container_name: gamelog-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "StrongPassword123!"
      POSTGRES_DB: GameLog
    ports:
      - "5432:5432"
    volumes:
      - sql-data:/var/lib/postgresql/data
    networks:
      - gamelog-network

  redis:
    image: redis:7-alpine
    container_name: gamelog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gamelog-network

volumes:
  sql-data:

networks:
  gamelog-network:
    driver: bridge
