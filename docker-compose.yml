services:
  nginx:
    build: ./docker/nginx
    container_name: gamelog-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-}
      - SSL_EMAIL=${SSL_EMAIL:-}
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - gamelog-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: gamelog-frontend
    networks:
      - gamelog-network
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: gamelog-backend
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=gamelog-db;Database=GameLog;Username=postgres;Password=StrongPassword123!
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=local-docker-secret-key-minimum-32-characters!!
      - ExternalApis__Igdb__ClientId=${IGDB_CLIENT_ID:-}
      - ExternalApis__Igdb__ClientSecret=${IGDB_CLIENT_SECRET:-}
      - Riot__ApiKey=${RIOT_API_KEY:-}
      - Steam__ApiKey=${STEAM_API_KEY:-}
      - FeatureFlags__AuthEnabled=${AUTH_ENABLED:-true}
      - FeatureFlags__MultiplayerEnabled=${MULTIPLAYER_ENABLED:-true}
      - FeatureFlags__SocialFeaturesEnabled=${SOCIAL_FEATURES_ENABLED:-false}
      - FeatureFlags__ReviewsEnabled=${REVIEWS_ENABLED:-true}
      - FeatureFlags__BacklogEnabled=${BACKLOG_ENABLED:-true}
      - FeatureFlags__StatisticsEnabled=${STATISTICS_ENABLED:-false}
    networks:
      - gamelog-network
    depends_on:
      gamelog-db:
        condition: service_healthy
      redis:
        condition: service_started

  gamelog-db:
    image: postgres:16-alpine
    container_name: gamelog-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "StrongPassword123!"
      POSTGRES_DB: GameLog
    ports:
      - "5432:5432"
    volumes:
      - sql-data:/var/lib/postgresql/data
    networks:
      - gamelog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d GameLog"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: gamelog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gamelog-network

volumes:
  sql-data:
  certbot-certs:
  certbot-webroot:

networks:
  gamelog-network:
    driver: bridge
