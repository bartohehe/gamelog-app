name: Build and deploy Node.js app to Azure Web App - cloud-task-manager-frontend
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: "https://claud-task-menager-api-94978-dmazhghragdrbhax.germanywestcentral-01.azurewebsites.net/api"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist/
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_24FB8EC1FDD140EAB3437C54167BA651 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_32E97225D9BE4BC28A097685E2B85B6F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9E885EB4ED03498EA0AE6F792B3DF9A4 }}
      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cloud-task-menager-frontend'
          package: dist
          startup-command: "pm2 serve /home/site/wwwroot --no-daemon --spa"
